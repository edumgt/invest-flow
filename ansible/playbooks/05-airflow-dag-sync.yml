---
# ─────────────────────────────────────────────────────────────────────────────
# 05-airflow-dag-sync.yml  —  DAG 파일을 Airflow VM에 동기화
#
# 실행:
#   ansible-playbook playbooks/05-airflow-dag-sync.yml          (전체 DAG)
#   ansible-playbook playbooks/05-airflow-dag-sync.yml \
#     -e "dag_file=precision_classifier_dag.py"                  (특정 파일)
# ─────────────────────────────────────────────────────────────────────────────
- name: Airflow DAG 파일 동기화
  hosts: airflow
  gather_facts: false
  vars:
    local_dags_dir: "{{ project_root }}/airflow/dags"
    dag_file: ""       # 빈 문자열 = 전체 동기화

  tasks:
    # ── DAG 디렉터리 권한 확인 및 수정 ───────────────────────────────────────
    - name: DAG 디렉터리 소유권을 ubuntu로 변경 (Docker 볼륨은 root 소유)
      ansible.builtin.file:
        path: "{{ airflow_dags_dir }}"
        owner: ubuntu
        group: ubuntu
        recurse: false
        state: directory
        mode: '0755'
      become: true

    # ── 특정 파일만 복사 ─────────────────────────────────────────────────────
    - name: 특정 DAG 파일 복사
      ansible.builtin.copy:
        src: "{{ local_dags_dir }}/{{ dag_file }}"
        dest: "{{ airflow_dags_dir }}/{{ dag_file }}"
        owner: ubuntu
        group: ubuntu
        mode: '0644'
      become: true
      when: dag_file != ""
      notify: Airflow DAG 갱신됨

    # ── 전체 DAG 동기화 (로컬 .py → 원격) ───────────────────────────────────
    - name: 로컬 DAG 파일 목록 수집
      ansible.builtin.find:
        paths: "{{ local_dags_dir }}"
        patterns: "*.py"
      register: local_dag_files
      delegate_to: localhost
      when: dag_file == ""

    - name: 전체 DAG 파일 복사
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ airflow_dags_dir }}/{{ item.path | basename }}"
        owner: ubuntu
        group: ubuntu
        mode: '0644'
      become: true
      loop: "{{ local_dag_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when: dag_file == ""
      notify: Airflow DAG 갱신됨

    # ── 결과 확인 ─────────────────────────────────────────────────────────────
    - name: 원격 DAG 목록 확인
      ansible.builtin.find:
        paths: "{{ airflow_dags_dir }}"
        patterns: "*.py"
      register: remote_dags

    - name: 동기화 결과 출력
      ansible.builtin.debug:
        msg:
          - "동기화 완료: {{ remote_dags.files | length }}개 DAG"
          - "{{ remote_dags.files | map(attribute='path') | map('basename') | list | sort }}"

    # ── Airflow API로 DAG 인식 상태 확인 ─────────────────────────────────────
    - name: Airflow API로 DAG 목록 확인
      ansible.builtin.uri:
        url: "{{ airflow_api_url }}/dags?limit=20"
        user: "{{ airflow_api_user }}"
        password: "{{ airflow_api_pass }}"
        force_basic_auth: true
        status_code: 200
      register: dag_api_result
      failed_when: false
      delegate_to: localhost

    - name: Airflow 인식 DAG 출력
      ansible.builtin.debug:
        msg: "Airflow 인식 DAG: {{ dag_api_result.json.dags | map(attribute='dag_id') | list }}"
      when: dag_api_result.status == 200

  handlers:
    - name: Airflow DAG 갱신됨
      ansible.builtin.debug:
        msg: "DAG 파일 업데이트 완료. Airflow가 약 30초 내 자동 감지합니다."
