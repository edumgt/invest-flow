# ── 로컬 (WSL2) ──────────────────────────────────────────────────────────────
[local]
localhost ansible_connection=local

# ── Airflow VM ───────────────────────────────────────────────────────────────
[airflow]
airflow-vm ansible_host=192.168.253.149 ansible_user=ubuntu
# SSH 키가 설정된 경우 아래 주석 해제:
# ansible_ssh_private_key_file=~/.ssh/id_ed25519

# ── 백엔드 서버 (현재는 WSL2 로컬) ───────────────────────────────────────────
[backend]
localhost ansible_connection=local

# ── 전체 그룹 ─────────────────────────────────────────────────────────────────
[invest_flow:children]
local
airflow
