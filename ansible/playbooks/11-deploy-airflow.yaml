---
- name: Deploy Apache Airflow
  hosts: airflow_servers
  become: true
  vars:
    airflow_version: "2.8.1"
    airflow_user: "airflow"
    airflow_home: "/home/{{ airflow_user }}/airflow"
    python_version: "3.10"

  tasks:
    - name: 필수 시스템 패키지 설치
      apt:
        name:
          - python3-pip
          - python3-dev
          - python3-venv
          - libssl-dev
          - libffi-dev
          - build-essential
        state: present
        update_cache: yes

    - name: Airflow 실행을 위한 전용 유저 생성
      user:
        name: "{{ airflow_user }}"
        shell: /bin/bash
        home: "/home/{{ airflow_user }}"
        state: present

    - name: Airflow Home 디렉토리 생성 및 권한 설정
      file:
        path: "{{ airflow_home }}"
        state: directory
        owner: "{{ airflow_user }}"
        group: "{{ airflow_user }}"
        mode: '0755'

    - name: Airflow 및 제약사항(Constraints) 파일을 이용한 pip 설치
      become_user: "{{ airflow_user }}"
      pip:
        name: "apache-airflow=={{ airflow_version }}"
        extra_args: "--constraint https://raw.githubusercontent.com/apache/airflow/constraints-{{ airflow_version }}/constraints-{{ python_version }}.txt"

    - name: Airflow 데이터베이스 초기화 (db init)
      become_user: "{{ airflow_user }}"
      environment:
        AIRFLOW_HOME: "{{ airflow_home }}"
      command: "airflow db init"
      args:
        creates: "{{ airflow_home }}/airflow.db"

    - name: Airflow 관리자(Admin) 계정 생성
      become_user: "{{ airflow_user }}"
      environment:
        AIRFLOW_HOME: "{{ airflow_home }}"
      command: >
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password adminpass
      register: user_create_result
      changed_when: "'already exists' not in user_create_result.stdout"
      failed_when: 
        - user_create_result.rc != 0
        - "'already exists' not in user_create_result.stderr"

    - name: Airflow Webserver 시스템 서비스(systemd) 파일 등록
      copy:
        dest: /etc/systemd/system/airflow-webserver.service
        content: |
          [Unit]
          Description=Airflow webserver daemon
          After=network.target

          [Service]
          User={{ airflow_user }}
          Environment=AIRFLOW_HOME={{ airflow_home }}
          ExecStart=/usr/local/bin/airflow webserver --port 8080
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target

    - name: Airflow Scheduler 시스템 서비스(systemd) 파일 등록
      copy:
        dest: /etc/systemd/system/airflow-scheduler.service
        content: |
          [Unit]
          Description=Airflow scheduler daemon
          After=network.target

          [Service]
          User={{ airflow_user }}
          Environment=AIRFLOW_HOME={{ airflow_home }}
          ExecStart=/usr/local/bin/airflow scheduler
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target

    - name: systemd 데몬 재로드 및 서비스 활성화/시작
      systemd:
        daemon_reload: yes
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - airflow-webserver
        - airflow-scheduler