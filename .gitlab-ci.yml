# GitLab CI/CD Pipeline for Vue + Node.js Calendar App
# GitLab Runner 에서 실행되는 CI/CD 파이프라인 정의
#
# Pipeline stages:
#   1. build   - 프론트엔드 및 백엔드 빌드
#   2. test    - 린트 및 단위 테스트
#   3. docker  - Docker 이미지 빌드 및 레지스트리 푸시
#   4. deploy  - 스테이징/프로덕션 배포
#   5. notify  - Airflow 파이프라인 완료 콜백

image: node:20-alpine

variables:
  # Docker-in-Docker 설정
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # 애플리케이션 이미지 이름 (GitLab Container Registry)
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  # Airflow 콜백 URL (환경변수로 주입)
  AIRFLOW_API_URL: ${AIRFLOW_API_URL:-http://airflow-webserver:8793/api/v1}
  AIRFLOW_DAG_ID: "calendar_app_pipeline"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/
    - backend/node_modules/

stages:
  - build
  - test
  - docker
  - deploy
  - notify

# ─────────────────────────────────────────────
# Stage 1: Build
# ─────────────────────────────────────────────
build:frontend:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "api"'

build:backend:
  stage: build
  script:
    - cd backend
    - npm ci
    - echo "Backend build complete (Node.js ESM — no transpile needed)"
  artifacts:
    paths:
      - backend/src/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "api"'

# ─────────────────────────────────────────────
# Stage 2: Test
# ─────────────────────────────────────────────
test:frontend:
  stage: test
  script:
    - npm ci
    - npm run build
    - echo "Frontend type-check passed"
  needs:
    - build:frontend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "api"'

test:backend:
  stage: test
  script:
    - cd backend
    - npm ci
    - node --check src/server.js
    - node --check src/db.js
    - node --check src/middleware.js
    - echo "Backend syntax check passed"
  needs:
    - build:backend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "api"'

# ─────────────────────────────────────────────
# Stage 3: Docker Build & Push
# ─────────────────────────────────────────────
docker:build:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
  needs:
    - test:frontend
    - test:backend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "api"'

# ─────────────────────────────────────────────
# Stage 4: Deploy
# ─────────────────────────────────────────────
deploy:staging:
  stage: deploy
  image: docker:27
  services:
    - docker:27-dind
  environment:
    name: staging
    url: http://gitlab.local:5173
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker pull "$IMAGE_TAG"
    - docker stop calendar_frontend_staging || true
    - docker rm calendar_frontend_staging || true
    - |
      docker run -d \
        --name calendar_frontend_staging \
        -p 5173:5173 \
        -e VITE_API_URL="${VITE_API_URL:-http://localhost:3000}" \
        "$IMAGE_TAG"
  needs:
    - docker:build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "api"'

# ─────────────────────────────────────────────
# Stage 5: Notify Airflow (파이프라인 완료 콜백)
# ─────────────────────────────────────────────
notify:airflow:success:
  stage: notify
  image: curlimages/curl:8.7.1
  script:
    - |
      echo "Notifying Airflow of successful pipeline..."
      curl -s -o /dev/null -w "%{http_code}" \
        --retry 3 --retry-delay 5 \
        -X POST "${AIRFLOW_API_URL}/dags/${AIRFLOW_DAG_ID}/dagRuns" \
        -H "Content-Type: application/json" \
        -H "Authorization: Basic ${AIRFLOW_BASIC_AUTH:-YWRtaW46YWRtaW4=}" \
        -d "{
          \"dag_run_id\": \"gitlab_pipeline_${CI_PIPELINE_ID}_success\",
          \"conf\": {
            \"pipeline_id\": \"${CI_PIPELINE_ID}\",
            \"commit_sha\": \"${CI_COMMIT_SHORT_SHA}\",
            \"branch\": \"${CI_COMMIT_BRANCH}\",
            \"status\": \"success\",
            \"project\": \"${CI_PROJECT_NAME}\",
            \"triggered_by\": \"gitlab-ci\"
          }
        }" || echo "Airflow notification skipped (non-critical)"
  when: on_success
  needs:
    - deploy:staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

notify:airflow:failure:
  stage: notify
  image: curlimages/curl:8.7.1
  script:
    - |
      echo "Notifying Airflow of failed pipeline..."
      curl -s -o /dev/null -w "%{http_code}" \
        --retry 3 --retry-delay 5 \
        -X POST "${AIRFLOW_API_URL}/dags/${AIRFLOW_DAG_ID}/dagRuns" \
        -H "Content-Type: application/json" \
        -H "Authorization: Basic ${AIRFLOW_BASIC_AUTH:-YWRtaW46YWRtaW4=}" \
        -d "{
          \"dag_run_id\": \"gitlab_pipeline_${CI_PIPELINE_ID}_failure\",
          \"conf\": {
            \"pipeline_id\": \"${CI_PIPELINE_ID}\",
            \"commit_sha\": \"${CI_COMMIT_SHORT_SHA}\",
            \"branch\": \"${CI_COMMIT_BRANCH}\",
            \"status\": \"failure\",
            \"project\": \"${CI_PROJECT_NAME}\",
            \"triggered_by\": \"gitlab-ci\"
          }
        }" || echo "Airflow notification skipped (non-critical)"
  when: on_failure
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
