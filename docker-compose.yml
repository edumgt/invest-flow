services:
  backend:
    build:
      context: ./backend
    container_name: calendar_backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://calendar:calendar123@postgres:5432/calendar_app
      JWT_SECRET: super-secret-jwt-key
      CORS_ORIGIN: http://localhost:8302
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "8301:3000"
    networks:
      - shared-net

  frontend:
    build:
      context: ./frontend
    container_name: calendar_frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8301
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8302:5173"

networks:
  shared-net:
    external: true
