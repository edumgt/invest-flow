# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test --if-present

  # GitHub → GitLab 미러링 (main 브랜치 push 시에만 실행)
  mirror-to-gitlab:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Mirror to GitLab
      env:
        # GitLab Personal Access Token (repo:write 권한)
        # GitHub 저장소 Settings > Secrets > Actions 에 등록 필요
        GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        # 예: http://gitlab.local:8080 또는 https://gitlab.example.com
        GITLAB_URL: ${{ secrets.GITLAB_URL }}
        # 예: namespace/Vue_vite_tailwind_tui.calendar
        GITLAB_PROJECT_PATH: ${{ secrets.GITLAB_PROJECT_PATH }}
      run: |
        if [[ -z "$GITLAB_TOKEN" || -z "$GITLAB_URL" || -z "$GITLAB_PROJECT_PATH" ]]; then
          echo "GitLab 시크릿(GITLAB_TOKEN, GITLAB_URL, GITLAB_PROJECT_PATH)이 설정되지 않아 미러링을 건너뜁니다."
          exit 0
        fi

        # 토큰을 URL에 직접 포함하지 않고 credential helper를 사용해 보안 유지
        git config --global credential.helper store
        echo "$(echo "$GITLAB_URL" | sed 's|https\?://||'):${GITLAB_TOKEN}" \
          > /tmp/.git-credentials 2>/dev/null || true

        GITLAB_GIT_URL="${GITLAB_URL%/}/${GITLAB_PROJECT_PATH}.git"
        # URL 스킴에 토큰 삽입 (HTTPS 방식)
        AUTHED_URL="$(echo "$GITLAB_URL" | sed "s|://|://oauth2:${GITLAB_TOKEN}@|")/${GITLAB_PROJECT_PATH}.git"

        git remote add gitlab "$AUTHED_URL" 2>/dev/null || \
          git remote set-url gitlab "$AUTHED_URL"
        git push gitlab "refs/heads/main:refs/heads/main" --force
        echo "GitLab 미러링 완료: $GITLAB_GIT_URL"
