---
# ─────────────────────────────────────────────────────────────────────────────
# 07-docker-manage.yml  —  BE / FE 컨테이너 시작 / 중지 / 재시작 / 상태 확인
#
# 네이티브(WSL) 실행과 동일한 포트:
#   BE: localhost:8301  (컨테이너 내부 3000 → 호스트 8301)
#   FE: localhost:8302  (컨테이너 내부 5173 → 호스트 8302)
#
# 실행:
#   ansible-playbook playbooks/07-docker-manage.yml -e "svc_action=status"
#   ansible-playbook playbooks/07-docker-manage.yml -e "svc_action=start"
#   ansible-playbook playbooks/07-docker-manage.yml -e "svc_action=stop"
#   ansible-playbook playbooks/07-docker-manage.yml -e "svc_action=restart"
#
#   서비스 한 개만:
#   ansible-playbook playbooks/07-docker-manage.yml -e "svc_action=start" --tags be
#   ansible-playbook playbooks/07-docker-manage.yml -e "svc_action=start" --tags fe
# ─────────────────────────────────────────────────────────────────────────────
- name: Docker 컨테이너 관리 (BE + FE)
  hosts: local
  gather_facts: false
  vars:
    svc_action: status
    compose_file: "{{ project_root }}/docker-compose.office.yml"
    env_file: "{{ project_root }}/.env.office"

  tasks:
    # ── env 파일 존재 확인 (backend/frontend 서비스가 env_file 로 참조함) ───────
    - name: .env.office 존재 확인
      ansible.builtin.stat:
        path: "{{ env_file }}"
      register: env_file_stat
      when: svc_action in ['start', 'restart']

    - name: .env.office 없으면 중단
      ansible.builtin.fail:
        msg: "{{ env_file }} 파일이 없습니다. .env.office.example 을 복사해 값을 채워주세요."
      when:
        - svc_action in ['start', 'restart']
        - not env_file_stat.stat.exists

    # ── 현재 상태 조회 ────────────────────────────────────────────────────────
    - name: 컨테이너 현재 상태 조회
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} ps \
          --format {% raw %}"table {{.Name}}\t{{.Status}}\t{{.Ports}}"{% endraw %} 2>/dev/null || echo "(실행 중 없음)"
      register: ps_result
      changed_when: false

    - name: 현재 상태 출력
      ansible.builtin.debug:
        msg: "{{ ps_result.stdout_lines }}"

    # ── STOP ─────────────────────────────────────────────────────────────────
    - name: 백엔드 컨테이너 중지
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} stop backend
        docker compose -f {{ compose_file }} rm -f backend
      args:
        executable: /bin/bash
      when: svc_action in ['stop', 'restart']
      changed_when: true
      ignore_errors: true
      tags: [be]

    - name: 프론트엔드 컨테이너 중지
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} stop frontend
        docker compose -f {{ compose_file }} rm -f frontend
      args:
        executable: /bin/bash
      when: svc_action in ['stop', 'restart']
      changed_when: true
      ignore_errors: true
      tags: [fe]

    # ── START ─────────────────────────────────────────────────────────────────
    # 네트워크는 docker compose up 이 자동 생성 (수동 생성 시 레이블 충돌)
    - name: 백엔드 컨테이너 시작
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} up -d --no-deps backend
      args:
        executable: /bin/bash
      when: svc_action in ['start', 'restart']
      changed_when: true
      tags: [be]

    - name: 백엔드 헬스체크 대기 (최대 20초)
      ansible.builtin.uri:
        url: "http://localhost:8301/health"
        status_code: 200
        timeout: 5
      register: be_health
      retries: 4
      delay: 5
      when: svc_action in ['start', 'restart']
      tags: [be]

    - name: 프론트엔드 컨테이너 시작
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} up -d --no-deps frontend
      args:
        executable: /bin/bash
      when: svc_action in ['start', 'restart']
      changed_when: true
      tags: [fe]

    - name: 프론트엔드 응답 대기 (최대 30초)
      ansible.builtin.uri:
        url: "http://localhost:8302"
        status_code: [200, 304]
        timeout: 5
      register: fe_health
      retries: 6
      delay: 5
      failed_when: false
      when: svc_action in ['start', 'restart']
      tags: [fe]

    # ── 최종 상태 출력 ─────────────────────────────────────────────────────────
    - name: 최종 컨테이너 상태
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} ps \
          --format {% raw %}"table {{.Name}}\t{{.Status}}\t{{.Ports}}"{% endraw %}
      register: final_ps
      changed_when: false
      when: svc_action in ['start', 'restart', 'status']

    - name: 서비스 접속 정보 출력
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "{{ final_ps.stdout_lines | join('\n') }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - " BE  → http://localhost:8301"
          - " FE  → http://localhost:8302"
          - " API → http://localhost:8301/health"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      when: svc_action in ['start', 'restart', 'status']

    # ── 로그 확인 (start/restart 시) ──────────────────────────────────────────
    - name: 백엔드 최근 로그 (15줄)
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} logs --tail=15 backend 2>&1
      register: be_logs
      changed_when: false
      when: svc_action in ['start', 'restart']
      tags: [be]

    - name: 백엔드 로그 출력
      ansible.builtin.debug:
        msg: "{{ be_logs.stdout_lines }}"
      when:
        - svc_action in ['start', 'restart']
        - be_logs is defined
      tags: [be]
